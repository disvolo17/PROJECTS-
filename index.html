<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core OS | Minimalist Suite</title>
    <style>
        :root {
            --sf-font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
            --bg: #000;
            --text: #fff;
            --accent: #007aff;
            --glass: blur(30px) saturate(180%);
            --card-bg: rgba(28, 28, 30, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--sf-font);
            height: 100vh;
            overflow: hidden;
            transition: background 0.8s ease;
        }

        /* --- Navigation --- */
        .nav-bar {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: var(--glass);
            padding: 4px;
            border-radius: 40px;
            z-index: 1000;
            border: 0.5px solid rgba(255,255,255,0.1);
        }

        .nav-item {
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            opacity: 0.5;
            color: #fff;
        }

        .nav-item.active { opacity: 1; background: #fff; color: #000; }

        /* --- Layout --- */
        .container { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px; }
        .app-section { display: none; width: 100%; max-width: 900px; animation: slideIn 0.5s ease-out; flex-direction: column; align-items: center; text-align: center; }
        .app-section.active { display: flex; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 1. Flow */
        #focus-input { background: none; border: none; color: #fff; font-size: clamp(2rem, 10vw, 6rem); font-weight: 700; text-align: center; outline: none; width: 100%; }
        .pulse-overlay { position: fixed; inset: 0; background: radial-gradient(circle, rgba(255,0,0,0.2) 0%, transparent 70%); opacity: 0; pointer-events: none; transition: 1s; z-index: -1; }

        /* 2. Cleanse */
        .cleanse-box { width: 100%; max-width: 500px; position: relative; }
        #cleanse-input { width: 100%; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 25px; color: #fff; font-size: 1.2rem; outline: none; resize: none; height: 180px; }
        .ghost-text { position: absolute; top: 25px; left: 25px; pointer-events: none; transition: 2s; opacity: 1; filter: blur(0); }

        /* 3. Orbit */
        .orbit-num { font-size: 6rem; font-weight: 800; letter-spacing: -3px; }
        .orbit-sub { font-family: monospace; opacity: 0.4; text-transform: uppercase; letter-spacing: 2px; }

        /* 4. Vision */
        #webcam { position: fixed; bottom: 30px; right: 30px; width: 140px; height: 105px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); transform: scaleX(-1); display: none; object-fit: cover; }
        .vision-content { max-width: 600px; transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .vision-content.blurred { filter: blur(30px); opacity: 0.1; transform: scale(0.95); }

        /* 5. Atmosphere */
        .sound-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .sound-btn { background: var(--card-bg); padding: 30px; border-radius: 28px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s; width: 160px; }
        .sound-btn.active { background: var(--accent); transform: scale(1.05); }
        .sound-btn span { display: block; font-size: 2rem; margin-bottom: 10px; }
        .sound-btn label { font-size: 11px; font-weight: 700; letter-spacing: 1px; opacity: 0.7; pointer-events: none; }
    </style>
</head>
<body>

    <div class="pulse-overlay" id="global-pulse"></div>
    <video id="webcam" autoplay playsinline></video>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="nav(1, this)">Flow</div>
        <div class="nav-item" onclick="nav(2, this)">Cleanse</div>
        <div class="nav-item" onclick="nav(3, this)">Orbit</div>
        <div class="nav-item" onclick="nav(4, this)">Vision</div>
        <div class="nav-item" onclick="nav(5, this)">Atmosphere</div>
    </nav>

    <main class="container">
        <section id="s1" class="app-section active">
            <input type="text" id="focus-input" placeholder="Just Type..." autocomplete="off">
            <p style="opacity:0.3; margin-top:30px">Фокус теряется через 3 секунды бездействия.</p>
        </section>

        <section id="s2" class="app-section">
            <div class="cleanse-box" id="c-box">
                <textarea id="cleanse-input" placeholder="Выгрузи мысль и нажми Enter..."></textarea>
            </div>
        </section>

        <section id="s3" class="app-section">
            <div class="orbit-sub" id="iss-telemetry">LAT: -- | LON: --</div>
            <div class="orbit-num" id="iss-speed">27,600</div>
            <p style="opacity:0.5">Скорость МКС (км/ч)</p>
        </section>

        <section id="s4" class="app-section">
            <div class="vision-content" id="v-text">
                <h2 style="font-size:3rem; margin-bottom:20px">Присутствие</h2>
                <p style="font-size:1.4rem; line-height:1.6; opacity:0.7">Интерфейс Apple всегда чувствует пользователя. Если ты отведешь взгляд или закроешь окно, этот текст станет недоступен. Концентрация — это выбор.</p>
            </div>
            <button class="nav-item" style="opacity:1; border:1px solid #fff; margin-top:40px" onclick="initVision()">Включить сенсор</button>
        </section>

        <section id="s5" class="app-section">
            <div class="sound-grid">
                <div class="sound-btn" onclick="toggleAtm(this, 'rain')"><span>🌧️</span><label>RAIN</label></div>
                <div class="sound-btn" onclick="toggleAtm(this, 'wind')"><span>🌬️</span><label>WIND</label></div>
                <div class="sound-btn" onclick="toggleAtm(this, 'fire')"><span>🔥</span><label>FIRE</label></div>
                <div class="sound-btn" onclick="toggleAtm(this, 'static')"><span>📻</span><label>WHITE NOISE</label></div>
            </div>
        </section>
    </main>

    <script>
        // --- Глобальный контроль состояний ---
        let currentApp = 1;
        function nav(id, el) {
            currentApp = id;
            document.querySelectorAll('.app-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('s' + id).classList.add('active');
            el.classList.add('active');
            
            // Очистка при переходе
            resetGlobalStates();
        }

        function resetGlobalStates() {
            document.getElementById('global-pulse').style.opacity = '0';
            clearTimeout(flowTimer);
            if(currentApp !== 4) stopCamera();
            if(currentApp !== 5) stopAllSounds();
        }

        // --- 1. Flow ---
        let flowTimer;
        const fInput = document.getElementById('focus-input');
        fInput.addEventListener('input', () => {
            if(currentApp !== 1) return;
            document.getElementById('global-pulse').style.opacity = '0';
            clearTimeout(flowTimer);
            flowTimer = setTimeout(() => {
                if(currentApp === 1) document.getElementById('global-pulse').style.opacity = '1';
            }, 3000);
        });

        // --- 2. Cleanse ---
        const cInput = document.getElementById('cleanse-input');
        cInput.addEventListener('keydown', (e) => {
            if(e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const val = cInput.value;
                if(!val) return;
                const ghost = document.createElement('div');
                ghost.className = 'ghost-text';
                ghost.innerText = val;
                document.getElementById('c-box').appendChild(ghost);
                setTimeout(() => {
                    ghost.style.transform = 'translateY(-100px)';
                    ghost.style.opacity = '0';
                    ghost.style.filter = 'blur(10px)';
                }, 10);
                setTimeout(() => ghost.remove(), 2000);
                cInput.value = '';
            }
        });

        // --- 3. Orbit (HTTPS API) ---
        async function fetchISS() {
            try {
                const res = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
                const d = await res.json();
                document.getElementById('iss-telemetry').innerText = `LAT: ${d.latitude.toFixed(4)} | LON: ${d.longitude.toFixed(4)}`;
                document.getElementById('iss-speed').innerText = Math.round(d.velocity).toLocaleString();
            } catch(e) {}
        }
        setInterval(fetchISS, 5000); fetchISS();

        // --- 4. Vision ---
        let vInterval;
        async function initVision() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('webcam');
                video.srcObject = stream;
                video.style.display = 'block';
                vInterval = setInterval(() => {
                    const text = document.getElementById('v-text');
                    (document.hasFocus()) ? text.classList.remove('blurred') : text.classList.add('blurred');
                }, 500);
            } catch(e) { alert("Camera Error"); }
        }
        function stopCamera() {
            const video = document.getElementById('webcam');
            if(video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            video.style.display = 'none';
            clearInterval(vInterval);
        }

        // --- 5. Atmosphere (Web Audio API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const activeNodes = {};

        function createNoise(type) {
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.loop = true;
            const filter = audioCtx.createBiquadFilter();
            filter.type = type === 'rain' ? 'lowpass' : 'bandpass';
            filter.frequency.value = type === 'rain' ? 800 : 400;
            const gain = audioCtx.createGain();
            gain.gain.value = 0.15;
            source.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            source.start();
            return { source, gain };
        }

        function toggleAtm(el, type) {
            if (activeNodes[type]) {
                activeNodes[type].source.stop();
                delete activeNodes[type];
                el.classList.remove('active');
            } else {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                activeNodes[type] = createNoise(type);
                el.classList.add('active');
            }
        }

        function stopAllSounds() {
            Object.keys(activeNodes).forEach(k => {
                activeNodes[k].source.stop();
                delete activeNodes[k];
            });
            document.querySelectorAll('.sound-btn').forEach(b => b.classList.remove('active'));
        }
    </script>
</body>
</html>
