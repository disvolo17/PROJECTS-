<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE OS 26.3 | ULTIMATE</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7/dist/blazeface.min.js"></script>

    <style>
        :root {
            --ios-bg: radial-gradient(circle at 50% 50%, #fbfbfd 0%, #d2d2d7 100%);
            --glass: blur(40px) saturate(180%) brightness(1.1);
            --accent: #007aff;
            --danger: rgba(255, 59, 48, 0.2);
            --spring: cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--ios-bg); font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; transition: background 0.8s ease; }

        /* Режим опасности (мигание) */
        @keyframes danger-pulse {
            0% { background-color: transparent; }
            50% { background-color: var(--danger); }
            100% { background-color: transparent; }
        }
        .danger-active { animation: danger-pulse 1.5s infinite; }

        /* Навигация */
        nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; background: rgba(255, 255, 255, 0.5); backdrop-filter: var(--glass);
            padding: 10px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.7);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); z-index: 10000;
        }
        .nav-btn {
            padding: 12px 28px; border-radius: 30px; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: 0.3s; opacity: 0.4; color: #000;
        }
        .nav-btn.active { opacity: 1; background: #fff; transform: scale(1.05); }

        /* Контент */
        main { width: 100%; height: 100vh; position: relative; }
        .view { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px; opacity: 0; transition: 0.5s var(--spring);
        }
        .view.active { display: flex; opacity: 1; z-index: 10; }

        /* Таб 1: Поток */
        #flow-area { 
            background: transparent; border: none; outline: none; resize: none; 
            width: 100%; max-width: 1000px; height: 75vh;
            font-size: 3.5rem; font-weight: 700; line-height: 1.1; letter-spacing: -2px;
            color: #1d1d1f; text-align: center; z-index: 20;
        }

        /* Таб 2: Очищение */
        #cleanse-txt { 
            background: rgba(255,255,255,0.3); border-radius: 40px; padding: 40px; 
            font-size: 2rem; backdrop-filter: blur(20px); border: 2px solid #fff; 
            width: 100%; max-width: 800px; height: 350px; outline: none;
        }

        /* Таб 3: МКС */
        .iss-box { width: 100%; max-width: 1000px; height: 550px; border-radius: 50px; overflow: hidden; border: 10px solid #fff; position: relative; box-shadow: 0 40px 80px rgba(0,0,0,0.1); }
        #map { width: 100%; height: 100%; background: #eee; }
        .iss-info { position: absolute; top: 25px; left: 25px; z-index: 1000; background: rgba(255,255,255,0.9); padding: 15px 25px; border-radius: 25px; backdrop-filter: blur(10px); }

        /* Таб 4: Взгляд */
        #v-shield { background: rgba(255,255,255,0.8); backdrop-filter: var(--glass); padding: 80px; border-radius: 60px; text-align: center; border: 1px solid #fff; transition: 1s var(--spring); }
        #v-shield.locked { filter: blur(100px); opacity: 0; transform: scale(0.8); }
        #webcam { position: fixed; top: 30px; right: 30px; width: 150px; height: 150px; border-radius: 75px; object-fit: cover; border: 5px solid #fff; z-index: 9999; display: none; transform: scaleX(-1); }

        /* Таб 5: Атмосфера */
        .sound-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; width: 100%; max-width: 950px; }
        .tile { background: rgba(255,255,255,0.4); border-radius: 35px; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.4s var(--spring); border: 1px solid #fff; }
        .tile.on { background: #fff; transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .tile span { font-size: 3rem; }

        .lux-particle { position: fixed; pointer-events: none; font-weight: 900; color: var(--accent); z-index: 10001; }
    </style>
</head>
<body id="main-body">

    <video id="webcam" autoplay muted playsinline></video>

    <nav>
        <div class="nav-btn active" onclick="tab(1, this)">Поток</div>
        <div class="nav-btn" onclick="tab(2, this)">Очищение</div>
        <div class="nav-btn" onclick="tab(3, this)">МКС</div>
        <div class="nav-btn" onclick="tab(4, this)">Взгляд</div>
        <div class="nav-btn" onclick="tab(5, this)">Атмосфера</div>
    </nav>

    <main>
        <section id="v1" class="view active">
            <textarea id="flow-area" placeholder="ПИШИ ИЛИ ЗАМЕРЗНИ..."></textarea>
        </section>

        <section id="v2" class="view">
            <textarea id="cleanse-txt" placeholder="Выгрузи хаос и нажми Enter..."></textarea>
        </section>

        <section id="v3" class="view">
            <div class="iss-box">
                <div class="iss-info">
                    <p id="v-speed">Speed: ---</p>
                    <p id="v-alt">Alt: ---</p>
                </div>
                <div id="map"></div>
            </div>
        </section>

        <section id="v4" class="view">
            <div id="v-shield" class="locked">
                <h2 style="font-size: 3rem;">Secure Area</h2>
                <p style="margin: 20px 0; opacity: 0.5;">Требуется биометрическое подтверждение.</p>
                <button id="v-btn" onclick="initAI()" style="padding: 18px 45px; border-radius: 40px; border: none; background: var(--accent); color: #fff; font-weight: 800; cursor: pointer;">Включить сканер</button>
            </div>
        </section>

        <section id="v5" class="view">
            <div class="sound-grid" id="audio-grid"></div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let currentTab = 1;
        let flowTimer;
        let model = null, vStream = null, isDetecting = false;
        const body = document.getElementById('main-body');

        // --- Переключение вкладок ---
        function tab(id, el) {
            currentTab = id;
            document.querySelectorAll('.view, .nav-btn').forEach(n => n.classList.remove('active'));
            document.getElementById('v'+id).classList.add('active');
            el.classList.add('active');

            if(id === 1) {
                document.getElementById('flow-area').focus();
                resetFlowTimer();
            } else {
                stopDanger();
                clearTimeout(flowTimer);
            }
            if(id === 3) setTimeout(() => { map.invalidateSize(); }, 400);
            if(id !== 4) stopAI();
        }

        // --- Логика Потока (Режим 5 секунд) ---
        const flowInput = document.getElementById('flow-area');
        flowInput.value = localStorage.getItem('core-flow') || "";

        function resetFlowTimer() {
            stopDanger();
            clearTimeout(flowTimer);
            if (currentTab === 1) {
                flowTimer = setTimeout(startDanger, 5000);
            }
        }

        function startDanger() { body.classList.add('danger-active'); }
        function stopDanger() { body.classList.remove('danger-active'); }

        flowInput.oninput = () => {
            localStorage.setItem('core-flow', flowInput.value);
            resetFlowTimer();
        };

        // --- Логика Очищения ---
        const clInput = document.getElementById('cleanse-txt');
        clInput.onkeydown = (e) => {
            if(e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const rect = clInput.getBoundingClientRect();
                [...clInput.value].forEach(char => {
                    if(char === ' ' || char === '\n') return;
                    const el = document.createElement('div');
                    el.className = 'lux-particle'; el.innerText = char;
                    el.style.left = (rect.left + Math.random() * rect.width) + 'px';
                    el.style.top = (rect.top + Math.random() * rect.height) + 'px';
                    document.body.appendChild(el);
                    setTimeout(() => {
                        el.style.transform = `translate(${(Math.random()-0.5)*1500}px, ${(Math.random()-0.5)*1500}px) scale(0) rotate(720deg)`;
                        el.style.opacity = '0';
                    }, 50);
                    setTimeout(() => el.remove(), 2500);
                });
                clInput.value = '';
            }
        };

        // --- Логика МКС ---
        const map = L.map('map', {zoomControl:false, attributionControl:false}).setView([0,0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        const issIcon = L.divIcon({html:'<div style="font-size:35px">🛰️</div>', className:'', iconSize:[40,40]});
        const issMarker = L.marker([0,0], {icon: issIcon}).addTo(map);

        async function updateISS() {
            try {
                const r = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
                const d = await r.json();
                issMarker.setLatLng([d.latitude, d.longitude]);
                if(currentTab === 3) map.panTo([d.latitude, d.longitude]);
                document.getElementById('v-speed').innerText = "Speed: " + Math.round(d.velocity) + " km/h";
                document.getElementById('v-alt').innerText = "Alt: " + Math.round(d.altitude) + " km";
            } catch(e) {}
        }
        setInterval(updateISS, 4000); updateISS();

        // --- Логика Взгляда (AI) ---
        async function initAI() {
            const btn = document.getElementById('v-btn');
            const video = document.getElementById('webcam');
            btn.innerText = "Загрузка ИИ...";
            try {
                if(!model) model = await blazeface.load();
                vStream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = vStream;
                video.onloadedmetadata = () => {
                    video.play(); video.style.display = 'block';
                    isDetecting = true; btn.innerText = "Активно";
                    detect();
                };
            } catch (err) { btn.innerText = "Ошибка камеры"; }
        }

        async function detect() {
            if(!isDetecting) return;
            const preds = await model.estimateFaces(document.getElementById('webcam'), false);
            document.getElementById('v-shield').classList.toggle('locked', preds.length === 0);
            requestAnimationFrame(detect);
        }

        function stopAI() {
            isDetecting = false;
            if(vStream) vStream.getTracks().forEach(t => t.stop());
            document.getElementById('webcam').style.display = 'none';
            document.getElementById('v-shield').classList.add('locked');
            document.getElementById('v-btn').innerText = "Включить сканер";
        }

        // --- Логика Атмосферы ---
        const tracks = [
            {n:'Rain', i:'🌧️', f:'rain.mp3'}, {n:'Fire', i:'🔥', f:'fire.mp3'},
            {n:'Forest', i:'🌲', f:'forest.mp3'}, {n:'Wind', i:'🌬️', f:'wind.mp3'},
            {n:'Ocean', i:'🌊', f:'ocean.mp3'}, {n:'Storm', i:'⚡', f:'storm.mp3'},
            {n:'Cafe', i:'☕', f:'cafe.mp3'}, {n:'Train', i:'🚂', f:'train.mp3'},
            {n:'Night', i:'🌙', f:'night.mp3'}, {n:'Keys', i:'⌨️', f:'keys.mp3'}
        ];
        const activeAudios = {};
        const grid = document.getElementById('audio-grid');
        tracks.forEach(s => {
            const t = document.createElement('div');
            t.className = 'tile'; t.innerHTML = `<span>${s.i}</span><p>${s.n}</p>`;
            t.onclick = () => {
                if(activeAudios[s.n]) {
                    activeAudios[s.n].pause(); delete activeAudios[s.n]; t.classList.remove('on');
                } else {
                    const a = new Audio('sounds/' + s.f); a.loop = true; a.play();
                    activeAudios[s.n] = a; t.classList.add('on');
                }
            };
            grid.appendChild(t);
        });

        // Запуск таймера при старте
        resetFlowTimer();
    </script>
</body>
</html>
