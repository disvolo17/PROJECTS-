<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Core OS 26.3 | Visionary Elite</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
:root {
    --accent:#007aff;
}
body {
    margin:0;
    font-family:-apple-system;
    height:100vh;
    overflow:hidden;
}

/* NAV */
nav {
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    background:#fff;
    border-radius:40px;
    padding:8px;
}
.nav-btn {
    padding:10px 20px;
    cursor:pointer;
    opacity:.4;
}
.nav-btn.active {
    opacity:1;
}

/* VIEWS */
.view {
    display:none;
    height:100vh;
    align-items:center;
    justify-content:center;
}
.view.active {
    display:flex;
}

/* MAP */
#map {
    width:90%;
    height:80%;
    border-radius:20px;
}

/* HUD */
.hud {
    position:absolute;
    top:20px;
    left:20px;
    background:#fff;
    padding:15px;
    border-radius:20px;
}
</style>
</head>

<body>

<nav>
<div class="nav-btn active" onclick="tab(1,this)">Поток</div>
<div class="nav-btn" onclick="tab(2,this)">Очищение</div>
<div class="nav-btn" onclick="tab(3,this)">МКС</div>
<div class="nav-btn" onclick="tab(4,this)">Взгляд</div>
<div class="nav-btn" onclick="tab(5,this)">Атмосфера</div>
</nav>

<section id="v1" class="view active"><textarea placeholder="Пиши..."></textarea></section>
<section id="v2" class="view"><textarea placeholder="Очистка..."></textarea></section>

<section id="v3" class="view">
<div id="map"></div>

<div class="hud">
<div>Скорость: <span id="speed">0</span></div>
<div>Высота: <span id="alt">0</span></div>
<div>До тебя: <span id="dist">...</span></div>
</div>
</section>

<section id="v4" class="view">
<button onclick="startCamera()">Включить камеру</button>
<video id="video" autoplay style="width:200px"></video>
</section>

<section id="v5" class="view">
<p>Звуки (добавь mp3 в /sounds)</p>
</section>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// NAV
function tab(id,el){
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(v=>v.classList.remove('active'));
    document.getElementById('v'+id).classList.add('active');
    el.classList.add('active');
    if(id===3) setTimeout(()=>map.invalidateSize(),300);
}

// MAP
const map = L.map('map').setView([0,0],2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const marker = L.marker([0,0]).addTo(map);

// USER LOCATION
let userLat = 0;
let userLon = 0;

navigator.geolocation.getCurrentPosition(pos=>{
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;
},()=>{
    userLat = 52.52; // fallback (Amsterdam)
    userLon = 13.40;
});

// DISTANCE FUNCTION
function distance(lat1, lon1, lat2, lon2){
    const R = 6371;
    const dLat = (lat2-lat1)*Math.PI/180;
    const dLon = (lon2-lon1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 +
              Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
              Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ISS
async function updateISS(){
    try{
        const res = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
        const data = await res.json();

        const lat = data.latitude;
        const lon = data.longitude;

        marker.setLatLng([lat,lon]);

        document.getElementById('speed').innerText =
            Math.round(data.velocity)+' км/ч';

        document.getElementById('alt').innerText =
            Math.round(data.altitude)+' км';

        const dist = distance(userLat,userLon,lat,lon);
        document.getElementById('dist').innerText =
            Math.round(dist)+' км';

        map.panTo([lat,lon]);

    }catch(e){
        console.log("ISS API error");
    }
}
setInterval(updateISS,3000);
updateISS();

// CAMERA
async function startCamera(){
    const video = document.getElementById('video');
    try{
        const stream = await navigator.mediaDevices.getUserMedia({video:true});
        video.srcObject = stream;
    }catch(e){
        alert("Нет доступа к камере");
    }
}
</script>

</body>
</html>
