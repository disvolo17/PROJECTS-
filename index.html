<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core OS 26.3 | Visionary Final</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

    <style>
        :root {
            --ios-bg: radial-gradient(circle at 50% 50%, #ffffff 0%, #cfd4da 100%);
            --glass: blur(100px) saturate(210%) brightness(1.1);
            --accent: #007aff;
            --spring: cubic-bezier(0.15, 1, 0.3, 1.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--ios-bg); font-family: -apple-system, system-ui, sans-serif; height: 100vh; overflow: hidden; color: #1d1d1f; }

        nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; background: rgba(255, 255, 255, 0.4); backdrop-filter: var(--glass);
            padding: 8px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 30px 60px rgba(0,0,0,0.1); z-index: 10000;
        }
        .nav-btn {
            padding: 12px 24px; border-radius: 40px; font-size: 13px; font-weight: 700;
            cursor: pointer; transition: 0.5s var(--spring); opacity: 0.3;
        }
        .nav-btn.active { opacity: 1; background: #fff; transform: scale(1.05); }

        .view { display: none; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 60px; }
        .view.active { display: flex; animation: ios-reveal 0.8s var(--spring); }
        @keyframes ios-reveal { 0% { opacity: 0; transform: scale(0.98); } 100% { opacity: 1; transform: scale(1); } }

        /* Flow & Cleanse */
        textarea { background: none; border: none; outline: none; resize: none; width: 100%; max-width: 800px; line-height: 1.4; }
        #flow-area { font-size: 2.5rem; font-weight: 600; height: 70vh; }
        #cleanse-txt { background: rgba(255,255,255,0.4); border-radius: 40px; padding: 40px; font-size: 1.8rem; backdrop-filter: var(--glass); border: 1px solid #fff; }

        /* ISS */
        .iss-container { position: relative; width: 100%; max-width: 1000px; height: 500px; border-radius: 50px; overflow: hidden; border: 10px solid #fff; box-shadow: 0 40px 80px rgba(0,0,0,0.1); }
        #map { width: 100%; height: 100%; }
        .iss-hud { position: absolute; top: 20px; left: 20px; z-index: 1000; background: rgba(255,255,255,0.7); padding: 15px 25px; border-radius: 25px; display: flex; gap: 20px; backdrop-filter: blur(10px); }
        .stat-item h6 { font-size: 9px; color: #8e8e93; text-transform: uppercase; }
        .stat-item p { font-size: 1rem; font-weight: 700; }

        /* Vision Section */
        #v-shield { 
            background: rgba(255,255,255,0.6); backdrop-filter: var(--glass); 
            padding: 60px; border-radius: 50px; text-align: center; border: 1px solid #fff; 
            transition: 0.6s ease; max-width: 600px;
        }
        #v-shield.locked { filter: blur(80px); opacity: 0.1; transform: scale(0.9); pointer-events: none; }
        #webcam { position: fixed; top: 30px; right: 30px; width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid #fff; z-index: 9999; display: none; transform: scaleX(-1); }

        /* Sounds */
        .sound-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; width: 100%; max-width: 900px; }
        .tile { background: rgba(255,255,255,0.3); border-radius: 30px; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.5); }
        .tile.on { background: #fff; transform: scale(1.05); border-color: var(--accent); box-shadow: 0 10px 20px rgba(0,122,255,0.1); }
        .tile span { font-size: 2.5rem; }
        .tile p { font-size: 9px; font-weight: 800; color: #8e8e93; margin-top: 5px; }
        
        .lux-particle { position: fixed; pointer-events: none; font-weight: 800; color: var(--accent); transition: all 2s; z-index: 10001; }
    </style>
</head>
<body>

    <video id="webcam" autoplay muted playsinline></video>

    <nav>
        <div class="nav-btn active" onclick="tab(1, this)">Поток</div>
        <div class="nav-btn" onclick="tab(2, this)">Очищение</div>
        <div class="nav-btn" onclick="tab(3, this)">МКС</div>
        <div class="nav-btn" onclick="tab(4, this)">Взгляд</div>
        <div class="nav-btn" onclick="tab(5, this)">Атмосфера</div>
    </nav>

    <main>
        <section id="v1" class="view active"><textarea id="flow-area" placeholder="Начни писать..."></textarea></section>
        
        <section id="v2" class="view">
            <textarea id="cleanse-txt" placeholder="Выгрузи хаос (Enter)..."></textarea>
        </section>

        <section id="v3" class="view">
            <div class="iss-container">
                <div class="iss-hud">
                    <div class="stat-item"><h6>Скорость</h6><p id="v-speed">0</p></div>
                    <div class="stat-item"><h6>Высота</h6><p id="v-alt">0</p></div>
                </div>
                <div id="map"></div>
            </div>
        </section>

        <section id="v4" class="view">
            <div id="v-shield" class="vision-shield locked">
                <h2>Safe Mode</h2>
                <p style="margin: 20px 0; opacity: 0.6;">Контент защищен. Включите камеру и посмотрите в нее.</p>
                <button id="v-btn" onclick="toggleVision()" style="padding: 15px 35px; border-radius: 30px; border: none; background: var(--accent); color: #fff; font-weight: 700; cursor: pointer;">Включить камеру</button>
            </div>
        </section>

        <section id="v5" class="view"><div class="sound-grid" id="audio-grid"></div></section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let currentTab = 1;
        function tab(id, el) {
            currentTab = id;
            document.querySelectorAll('.view, .nav-btn').forEach(n => n.classList.remove('active'));
            document.getElementById('v'+id).classList.add('active');
            el.classList.add('active');
            if(id === 3) setTimeout(() => map.invalidateSize(), 400);
            if(id !== 4) stopVision();
            if(id !== 5) silenceAll();
        }

        // --- Cleanse Logic ---
        const cleanseInput = document.getElementById('cleanse-txt');
        cleanseInput.onkeydown = (e) => {
            if(e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const rect = cleanseInput.getBoundingClientRect();
                const text = cleanseInput.value;
                [...text].forEach(char => {
                    if(char === ' ' || char === '\n') return;
                    const el = document.createElement('div');
                    el.className = 'lux-particle'; el.innerText = char;
                    el.style.left = (rect.left + Math.random() * rect.width) + 'px';
                    el.style.top = (rect.top + Math.random() * rect.height) + 'px';
                    document.body.appendChild(el);
                    setTimeout(() => {
                        el.style.transform = `translate(${(Math.random()-0.5)*1000}px, ${(Math.random()-0.5)*1000}px) scale(0) rotate(720deg)`;
                        el.style.opacity = '0';
                    }, 50);
                    setTimeout(() => el.remove(), 2000);
                });
                cleanseInput.value = '';
            }
        };

        // --- ISS Logic ---
        const map = L.map('map', {zoomControl:false, attributionControl:false}).setView([0,0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        const issMarker = L.marker([0,0], {icon: L.divIcon({html:'🛰️', className:'', iconSize:[40,40]})}).addTo(map);
        async function updateISS() {
            try {
                const r = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
                const d = await r.json();
                issMarker.setLatLng([d.latitude, d.longitude]);
                if(currentTab === 3) map.panTo([d.latitude, d.longitude]);
                document.getElementById('v-speed').innerText = Math.round(d.velocity) + ' км/ч';
                document.getElementById('v-alt').innerText = Math.round(d.altitude) + ' км';
            } catch(e) {}
        }
        setInterval(updateISS, 4000); updateISS();

        // --- Vision (Face Logic) ---
        let vStream = null;
        let isDetecting = false;

        async function toggleVision() {
            const btn = document.getElementById('v-btn');
            const video = document.getElementById('webcam');
            const shield = document.getElementById('v-shield');

            try {
                vStream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = vStream;
                video.style.display = 'block';
                btn.innerText = "Сканирование...";
                
                // Простая эмуляция или подключение TensorFlow
                isDetecting = true;
                const checkFace = () => {
                    if(!isDetecting) return;
                    // Для теста: если камера включена — считаем что лицо есть
                    // На GitHub Pages это самый надежный способ проверки доступа
                    shield.classList.remove('locked');
                    requestAnimationFrame(checkFace);
                };
                checkFace();
            } catch (err) {
                btn.innerText = "Нет доступа к камере";
                console.error(err);
            }
        }

        function stopVision() {
            isDetecting = false;
            if(vStream) vStream.getTracks().forEach(t => t.stop());
            document.getElementById('webcam').style.display = 'none';
            document.getElementById('v-shield').classList.add('locked');
            document.getElementById('v-btn').innerText = "Включить камеру";
        }

        // --- Atmosphere ---
        const sounds = [
            {n:'Rain', i:'🌧️', f:'rain.mp3'}, {n:'Fire', i:'🔥', f:'fire.mp3'},
            {n:'Forest', i:'🌲', f:'forest.mp3'}, {n:'Wind', i:'🌬️', f:'wind.mp3'},
            {n:'Ocean', i:'🌊', f:'ocean.mp3'}, {n:'Storm', i:'⚡', f:'storm.mp3'},
            {n:'Cafe', i:'☕', f:'cafe.mp3'}, {n:'Train', i:'🚂', f:'train.mp3'},
            {n:'Night', i:'🌙', f:'night.mp3'}, {n:'Keys', i:'⌨️', f:'keys.mp3'}
        ];
        const active = {};
        const grid = document.getElementById('audio-grid');
        sounds.forEach(s => {
            const t = document.createElement('div');
            t.className = 'tile'; t.innerHTML = `<span>${s.i}</span><p>${s.n}</p>`;
            t.onclick = () => {
                if(active[s.n]) { active[s.n].pause(); delete active[s.n]; t.classList.remove('on'); }
                else { 
                    const a = new Audio('sounds/'+s.f); a.loop = true; a.play(); 
                    active[s.n] = a; t.classList.add('on'); 
                }
            };
            grid.appendChild(t);
        });
        function silenceAll() {
            Object.values(active).forEach(a => a.pause());
            for(let k in active) delete active[k];
            document.querySelectorAll('.tile').forEach(t => t.classList.remove('on'));
        }
    </script>
</body>
</html>
