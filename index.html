<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core OS 26.3 | Visionary Final Build</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>
    
    <style>
        :root {
            --ios-bg: radial-gradient(circle at 50% 50%, #ffffff 0%, #cfd4da 100%);
            --glass: blur(100px) saturate(210%) brightness(1.1);
            --accent: #007aff;
            --spring: cubic-bezier(0.15, 1, 0.3, 1.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--ios-bg); font-family: -apple-system, system-ui, sans-serif; height: 100vh; overflow: hidden; color: #1d1d1f; }

        /* --- UI: Navigation --- */
        nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; background: rgba(255, 255, 255, 0.4); backdrop-filter: var(--glass);
            padding: 8px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 30px 60px rgba(0,0,0,0.1); z-index: 10000;
        }
        .nav-btn {
            padding: 12px 24px; border-radius: 40px; font-size: 13px; font-weight: 700;
            cursor: pointer; transition: 0.5s var(--spring); opacity: 0.3;
        }
        .nav-btn.active { opacity: 1; background: #fff; transform: scale(1.05); box-shadow: 0 5px 15px rgba(0,0,0,0.03); }

        .view { display: none; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 60px; }
        .view.active { display: flex; animation: ios-reveal 1s var(--spring); }
        @keyframes ios-reveal { 0% { opacity: 0; transform: scale(0.95) translateY(20px); } 100% { opacity: 1; transform: scale(1); } }

        /* --- 1. FLOW --- */
        #flow-area { 
            background: none; border: none; font-size: 2.5rem; font-weight: 600; 
            outline: none; text-align: left; width: 100%; max-width: 800px; 
            height: 70vh; resize: none; line-height: 1.4; letter-spacing: -0.5px;
        }
        .alert-overlay { position: fixed; inset: 0; background: rgba(255, 59, 48, 0); pointer-events: none; z-index: 9000; transition: 0.4s; }
        .alert-overlay.on { animation: pulse-red 0.5s infinite alternate; }
        @keyframes pulse-red { 0% { background: rgba(255, 59, 48, 0); } 100% { background: rgba(255, 59, 48, 0.4); } }

        /* --- 2. CLEANSE --- */
        #cleanse-txt { 
            background: rgba(255,255,255,0.4); border-radius: 40px; padding: 40px; border: 1px solid #fff;
            font-size: 1.8rem; outline: none; resize: none; width: 100%; max-width: 800px; min-height: 300px;
            backdrop-filter: var(--glass);
        }
        .lux-particle {
            position: fixed; pointer-events: none; font-weight: 800; font-size: 1.8rem;
            color: var(--accent); z-index: 11000;
            filter: drop-shadow(0 0 15px rgba(0,122,255,0.4));
            transition: all 2s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        /* --- 3. ISS --- */
        .iss-container { position: relative; width: 100%; max-width: 1000px; height: 550px; }
        #map { width: 100%; height: 100%; border-radius: 50px; border: 10px solid #fff; box-shadow: 0 40px 80px rgba(0,0,0,0.1); }
        .iss-hud {
            position: absolute; top: 30px; left: 30px; z-index: 1000;
            background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(20px);
            padding: 20px 30px; border-radius: 30px; border: 1px solid #fff;
            display: flex; gap: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }
        .stat-item h6 { font-size: 10px; text-transform: uppercase; color: #8e8e93; letter-spacing: 1px; margin-bottom: 4px; }
        .stat-item p { font-size: 1.2rem; font-weight: 800; color: #1d1d1f; }

        /* --- 4. VISION (NATIVE GOOGLE ENGINE) --- */
        #v-shield { 
            background: rgba(255,255,255,0.6); backdrop-filter: var(--glass); 
            padding: 80px; border-radius: 60px; text-align: center; border: 1px solid #fff; 
            transition: 0.8s var(--spring); max-width: 700px;
        }
        #v-shield.locked { 
            filter: blur(100px) brightness(1.2); 
            opacity: 0.05; 
            transform: scale(0.9); 
            pointer-events: none;
        }
        #webcam { 
            position: fixed; top: 30px; right: 30px; 
            width: 130px; height: 130px; border-radius: 50%; 
            object-fit: cover; transform: scaleX(-1); 
            border: 4px solid #fff; z-index: 15000; display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* --- 5. ATMOSPHERE --- */
        .sound-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; width: 100%; max-width: 1000px; }
        .tile { 
            background: rgba(255,255,255,0.3); backdrop-filter: blur(40px); border-radius: 35px; aspect-ratio: 1;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.4s var(--spring); border: 1px solid rgba(255,255,255,0.5);
        }
        .tile.on { background: #fff; transform: translateY(-12px); box-shadow: 0 25px 50px rgba(0,122,255,0.1); border-color: var(--accent); }
        .tile span { font-size: 3rem; margin-bottom: 10px; }
        .tile p { font-size: 10px; font-weight: 900; color: #8e8e93; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="alert-overlay" id="overlay"></div>
    <video id="webcam" autoplay muted playsinline></video>

    <nav>
        <div class="nav-btn active" onclick="tab(1, this)">Поток</div>
        <div class="nav-btn" onclick="tab(2, this)">Очищение</div>
        <div class="nav-btn" onclick="tab(3, this)">МКС</div>
        <div class="nav-btn" onclick="tab(4, this)">Взгляд</div>
        <div class="nav-btn" onclick="tab(5, this)">Атмосфера</div>
    </nav>

    <main>
        <section id="v1" class="view active">
            <textarea id="flow-area" placeholder="Начни писать..."></textarea>
        </section>

        <section id="v2" class="view">
            <textarea id="cleanse-txt" placeholder="Выгрузи весь хаос..."></textarea>
            <p style="margin-top:20px; font-size:12px; font-weight:800; opacity:0.3">ENTER TO DISINTEGRATE</p>
        </section>

        <section id="v3" class="view">
            <div class="iss-container">
                <div class="iss-hud">
                    <div class="stat-item"><h6>Скорость</h6><p id="v-speed">0 км/ч</p></div>
                    <div class="stat-item"><h6>Высота</h6><p id="v-alt">0 км</p></div>
                    <div class="stat-item"><h6>Дистанция</h6><p id="v-dist">---</p></div>
                </div>
                <div id="map"></div>
            </div>
        </section>

        <section id="v4" class="view">
            <div id="v-shield" class="vision-shield locked">
                <h2 style="font-size: 4rem; letter-spacing: -3px; margin-bottom: 20px;">Safe Contact</h2>
                <p style="opacity:0.6; font-size:1.5rem; font-weight: 500;">Контент скрыт. Посмотрите в камеру для разблокировки.</p>
                <button onclick="initVision()" id="v-btn" style="margin-top:40px; padding:20px 50px; border-radius:40px; border:none; background:var(--accent); color:#fff; font-weight:800; cursor:pointer;">Включить FaceID</button>
            </div>
        </section>

        <section id="v5" class="view">
            <div class="sound-grid" id="audio-grid"></div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let currentTab = 1;
        let myPos = null;

        navigator.geolocation.getCurrentPosition(pos => {
            myPos = [pos.coords.latitude, pos.coords.longitude];
        });

        function tab(id, el) {
            currentTab = id;
            document.querySelectorAll('.view, .nav-btn').forEach(n => n.classList.remove('active'));
            document.getElementById('v'+id).classList.add('active');
            el.classList.add('active');
            if(id === 3) setTimeout(() => map.invalidateSize(), 500);
            if(id !== 4) stopVision();
            if(id !== 5) silenceAll();
        }

        // --- 1. FLOW ---
        let flowTimer;
        document.getElementById('flow-area').oninput = () => {
            document.getElementById('overlay').classList.remove('on');
            clearTimeout(flowTimer);
            flowTimer = setTimeout(() => { if(currentTab === 1) document.getElementById('overlay').classList.add('on'); }, 5000);
        };

        // --- 2. CLEANSE ---
        const cleanseInput = document.getElementById('cleanse-txt');
        cleanseInput.onkeydown = (e) => {
            if(e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const rect = cleanseInput.getBoundingClientRect();
                const text = cleanseInput.value;
                for(let i=0; i < text.length; i++) {
                    if(text[i] === ' ' || text[i] === '\n') continue;
                    const char = document.createElement('div');
                    char.className = 'lux-particle';
                    char.innerText = text[i];
                    char.style.left = (rect.left + Math.random() * rect.width) + 'px';
                    char.style.top = (rect.top + Math.random() * rect.height) + 'px';
                    document.body.appendChild(char);
                    setTimeout(() => {
                        char.style.transform = `translate(${(Math.random()-0.5)*1200}px, ${(Math.random()-0.5)*1200}px) rotate(${Math.random()*1080}deg) scale(0)`;
                        char.style.opacity = '0';
                    }, 50);
                    setTimeout(() => char.remove(), 2500);
                }
                cleanseInput.value = '';
            }
        };

        // --- 3. ISS ---
        const map = L.map('map', {zoomControl:false, attributionControl:false}).setView([0,0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        const issMarker = L.marker([0,0], {icon: L.divIcon({html:'<div style="font-size:40px">🛰️</div>', className:'', iconSize:[40,40]})}).addTo(map);
        
        async function updateISS() {
            try {
                const res = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
                const data = await res.json();
                issMarker.setLatLng([data.latitude, data.longitude]);
                if(currentTab === 3) map.panTo([data.latitude, data.longitude]);
                document.getElementById('v-speed').innerText = Math.round(data.velocity).toLocaleString() + ' км/ч';
                document.getElementById('v-alt').innerText = Math.round(data.altitude) + ' км';
            } catch(e){}
        }
        setInterval(updateISS, 3000); updateISS();

        // --- 4. VISION (NEW BLAZEFACE ENGINE) ---
        let model = null;
        let isDetecting = false;
        let videoStream = null;

        async function initVision() {
            const btn = document.getElementById('v-btn');
            const video = document.getElementById('webcam');
            btn.innerText = "Загрузка AI...";

            try {
                // 1. Загружаем модель
                model = await blazeface.load();
                
                // 2. Запрашиваем камеру
                videoStream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = videoStream;
                video.style.display = 'block';
                
                btn.innerText = "Система активна";
                btn.style.background = "#34c759";
                isDetecting = true;
                
                // 3. Цикл детекции
                detect();
            } catch (err) {
                btn.innerText = "Ошибка доступа";
                btn.style.background = "#ff3b30";
                console.error(err);
            }
        }

        async function detect() {
            if (!isDetecting) return;
            const video = document.getElementById('webcam');
            const shield = document.getElementById('v-shield');

            const predictions = await model.estimateFaces(video, false);

            if (predictions.length > 0) {
                shield.classList.remove('locked');
            } else {
                shield.classList.add('locked');
            }

            requestAnimationFrame(detect);
        }

        function stopVision() {
            isDetecting = false;
            const video = document.getElementById('webcam');
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
            }
            video.style.display = 'none';
            document.getElementById('v-shield').classList.add('locked');
        }

        // --- 5. ATMOSPHERE ---
        const activeAudio = {};
        const tracks = [
            {n:'Rain', i:'🌧️', f:'rain.mp3'}, {n:'Fire', i:'🔥', f:'fire.mp3'},
            {n:'Forest', i:'🌲', f:'forest.mp3'}, {n:'Wind', i:'🌬️', f:'wind.mp3'},
            {n:'Ocean', i:'🌊', f:'ocean.mp3'}, {n:'Storm', i:'⚡', f:'storm.mp3'},
            {n:'Cafe', i:'☕', f:'cafe.mp3'}, {n:'Train', i:'🚂', f:'train.mp3'},
            {n:'Night', i:'🌙', f:'night.mp3'}, {n:'Keys', i:'⌨️', f:'keys.mp3'}
        ];
        const grid = document.getElementById('audio-grid');
        tracks.forEach(t => {
            const div = document.createElement('div');
            div.className = 'tile';
            div.innerHTML = `<span>${t.i}</span><p>${t.n}</p>`;
            div.onclick = () => {
                if(activeAudio[t.n]) {
                    activeAudio[t.n].pause(); delete activeAudio[t.n];
                    div.classList.remove('on');
                } else {
                    const a = new Audio('sounds/' + t.f);
                    a.loop = true; a.play();
                    activeAudio[t.n] = a; div.classList.add('on');
                }
            };
            grid.appendChild(div);
        });
        function silenceAll() {
            Object.values(activeAudio).forEach(a => a.pause());
            for(let k in activeAudio) delete activeAudio[k];
            document.querySelectorAll('.tile').forEach(t => t.classList.remove('on'));
        }
    </script>
</body>
</html>
