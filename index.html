<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core OS 26.3 | Ultra Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tracking.js/1.1.3/tracking-min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tracking.js/1.1.3/data/face-min.js"></script>
    
    <style>
        :root {
            --ios-bg: radial-gradient(circle at 50% 50%, #ffffff 0%, #d2d7dd 100%);
            --glass: blur(120px) saturate(220%) brightness(1.1);
            --accent: #007aff;
            --spring: cubic-bezier(0.15, 1, 0.3, 1.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--ios-bg); font-family: -apple-system, system-ui, sans-serif; height: 100vh; overflow: hidden; color: #1d1d1f; }

        /* --- Navigation --- */
        nav {
            position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%);
            display: flex; background: rgba(255, 255, 255, 0.5); backdrop-filter: var(--glass);
            padding: 8px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.7);
            box-shadow: 0 30px 60px rgba(0,0,0,0.1); z-index: 10000;
        }
        .nav-btn {
            padding: 14px 28px; border-radius: 40px; font-size: 13px; font-weight: 700;
            cursor: pointer; transition: 0.5s var(--spring); opacity: 0.3;
        }
        .nav-btn.active { opacity: 1; background: #fff; transform: scale(1.05); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

        /* --- Views --- */
        .view { display: none; width: 100%; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        .view.active { display: flex; animation: ios-reveal 1s var(--spring); }
        @keyframes ios-reveal { 0% { opacity: 0; transform: scale(0.92) translateY(30px); filter: blur(20px); } 100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); } }

        /* --- P1: Flow --- */
        #flow-input { background: none; border: none; font-size: 6rem; font-weight: 800; outline: none; text-align: center; letter-spacing: -4px; width: 100%; color: #1d1d1f; }
        .alert-overlay { position: fixed; inset: 0; background: rgba(255, 59, 48, 0); pointer-events: none; z-index: 9000; transition: 0.4s; }
        .alert-overlay.on { animation: pulse-red 0.5s infinite alternate; }
        @keyframes pulse-red { 0% { background: rgba(255, 59, 48, 0); } 100% { background: rgba(255, 59, 48, 0.4); } }

        /* --- P2: Cleanse (Super-Expensive Dissolve) --- */
        #cleanse-txt { 
            background: rgba(255,255,255,0.4); border-radius: 45px; padding: 50px; border: 2px solid #fff;
            font-size: 2rem; outline: none; resize: none; width: 100%; max-width: 800px; min-height: 300px;
            backdrop-filter: var(--glass); box-shadow: 0 50px 100px rgba(0,0,0,0.05);
        }
        .char-particle {
            position: fixed; pointer-events: none; font-weight: 900; font-size: 2rem;
            color: var(--accent); white-space: pre; z-index: 11000;
            transition: transform 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 1s ease-out;
            text-shadow: 0 10px 20px rgba(0,122,255,0.2);
        }

        /* --- P3: ISS --- */
        .iss-stats { background: #fff; padding: 25px 50px; border-radius: 40px; display: flex; gap: 50px; margin-bottom: 35px; box-shadow: 0 20px 40px rgba(0,0,0,0.03); }
        .iss-stats div h6 { font-size: 11px; text-transform: uppercase; color: #8e8e93; letter-spacing: 1px; }
        .iss-stats div p { font-size: 1.5rem; font-weight: 800; }
        #map { width: 100%; max-width: 1000px; height: 500px; border-radius: 60px; border: 10px solid #fff; box-shadow: 0 60px 120px rgba(0,0,0,0.12); }

        /* --- P4: Vision (Fully Fixed) --- */
        .vision-gate { background: rgba(255,255,255,0.6); backdrop-filter: var(--glass); padding: 80px; border-radius: 70px; text-align: center; border: 1px solid #fff; transition: 0.8s var(--spring); }
        .vision-gate.locked { filter: blur(90px); opacity: 0; transform: scale(0.7); }
        #webcam { position: fixed; bottom: 40px; right: 40px; width: 180px; height: 135px; border-radius: 30px; object-fit: cover; transform: scaleX(-1); border: 4px solid #fff; box-shadow: 0 20px 50px rgba(0,0,0,0.15); z-index: 15000; display: none; }

        /* --- P5: Atmosphere (Verified Sounds) --- */
        .grid-sounds { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; width: 100%; max-width: 1000px; }
        .audio-tile { 
            background: rgba(255,255,255,0.3); backdrop-filter: blur(40px); border-radius: 40px; aspect-ratio: 1;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.4s var(--spring); border: 1px solid rgba(255,255,255,0.5);
        }
        .audio-tile.active { background: #fff; transform: translateY(-12px) scale(1.08); border-color: var(--accent); box-shadow: 0 30px 60px rgba(0,122,255,0.15); }
        .audio-tile span { font-size: 3.5rem; margin-bottom: 12px; }
        .audio-tile p { font-size: 11px; font-weight: 800; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div class="alert-overlay" id="overlay"></div>
    <video id="webcam" autoplay muted playsinline></video>

    <nav>
        <div class="nav-btn active" onclick="switchTab(1, this)">Поток</div>
        <div class="nav-btn" onclick="switchTab(2, this)">Очищение</div>
        <div class="nav-btn" onclick="switchTab(3, this)">МКС</div>
        <div class="nav-btn" onclick="switchTab(4, this)">Взгляд</div>
        <div class="nav-btn" onclick="switchTab(5, this)">Атмосфера</div>
    </nav>

    <main>
        <section id="v1" class="view active">
            <input type="text" id="flow-input" placeholder="Пиши не останавливаясь..." autocomplete="off">
        </section>

        <section id="v2" class="view">
            <textarea id="cleanse-txt" placeholder="Выгрузи свой хаос здесь..."></textarea>
            <p style="margin-top:30px; font-size:14px; font-weight:800; opacity:0.3; letter-spacing: 2px;">PRESS ENTER TO DISINTEGRATE</p>
        </section>

        <section id="v3" class="view">
            <div class="iss-stats">
                <div><h6>Velocity</h6><p id="iss-v">0 km/h</p></div>
                <div><h6>Altitude</h6><p id="iss-a">0 km</p></div>
                <div><h6>Position</h6><p id="iss-c">0, 0</p></div>
            </div>
            <div id="map"></div>
        </section>

        <section id="v4" class="view">
            <div id="gate" class="vision-gate locked">
                <h2 style="font-size: 4.5rem; letter-spacing: -4px; margin-bottom: 20px;">Secure Vision</h2>
                <p style="opacity:0.5; font-size:1.4rem; font-weight: 500;">Данные зашифрованы. Требуется непрерывный зрительный контакт.</p>
                <button onclick="bootCamera()" style="margin-top:40px; padding:20px 50px; border-radius:40px; border:none; background:var(--accent); color:#fff; font-weight:800; font-size: 1.1rem; cursor:pointer; box-shadow: 0 20px 40px rgba(0,122,255,0.3);">Активировать FaceID</button>
            </div>
        </section>

        <section id="v5" class="view">
            <div class="grid-sounds" id="soundboard"></div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let tabId = 1;

        function switchTab(id, el) {
            tabId = id;
            document.querySelectorAll('.view, .nav-btn').forEach(n => n.classList.remove('active'));
            document.getElementById('v'+id).classList.add('active');
            el.classList.add('active');
            
            document.getElementById('overlay').classList.remove('on');
            if(id === 3) setTimeout(() => map.invalidateSize(), 500);
            if(id !== 4) killCamera();
            if(id !== 5) silenceAll();
        }

        // --- 1. FLOW ---
        let flowReset;
        document.getElementById('flow-input').oninput = () => {
            document.getElementById('overlay').classList.remove('on');
            clearTimeout(flowReset);
            flowReset = setTimeout(() => { if(tabId === 1) document.getElementById('overlay').classList.add('on'); }, 5000);
        };

        // --- 2. CLEANSE (Physical Disintegration) ---
        const input = document.getElementById('cleanse-txt');
        input.onkeydown = (e) => {
            if(e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const box = input.getBoundingClientRect();
                const text = input.value;
                
                // Создаем частицы для каждого символа для "дорогого" эффекта
                for(let i = 0; i < text.length; i++) {
                    if(text[i] === ' ' || text[i] === '\n') continue;
                    
                    const char = document.createElement('div');
                    char.className = 'char-particle';
                    char.innerText = text[i];
                    
                    // Начальная позиция внутри текстового поля
                    char.style.left = (box.left + 50 + Math.random() * (box.width - 100)) + 'px';
                    char.style.top = (box.top + 50 + Math.random() * (box.height - 100)) + 'px';
                    document.body.appendChild(char);

                    // Физика распада
                    setTimeout(() => {
                        const angle = (Math.random() - 0.5) * 40;
                        const drop = window.innerHeight + 200;
                        char.style.transform = `translateY(${drop}px) rotate(${angle}deg) scale(0.5)`;
                        char.style.opacity = '0';
                    }, Math.random() * 800);
                    
                    setTimeout(() => char.remove(), 2500);
                }
                input.value = '';
            }
        };

        // --- 3. ISS ---
        const map = L.map('map', {zoomControl:false, attributionControl:false}).setView([0,0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        const sat = L.marker([0,0], {icon: L.divIcon({html:'<div style="font-size:45px; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.15))">🛰️</div>', iconSize:[50,50], className:''})}).addTo(map);
        
        async function fetchISS() {
            try {
                const r = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
                const d = await r.json();
                const p = [d.latitude, d.longitude];
                sat.setLatLng(p); if(tabId === 3) map.panTo(p);
                document.getElementById('iss-v').innerText = Math.round(d.velocity).toLocaleString() + ' km/h';
                document.getElementById('iss-a').innerText = Math.round(d.altitude) + ' km';
                document.getElementById('iss-c').innerText = `${d.latitude.toFixed(2)}, ${d.longitude.toFixed(2)}`;
            } catch(e){}
        }
        setInterval(fetchISS, 3000); fetchISS();

        // --- 4. VISION (Strict Fix) ---
        let vTask;
        async function bootCamera() {
            const video = document.getElementById('webcam');
            video.style.display = 'block';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                
                // Ждем загрузки метаданных видео перед трекингом
                video.onloadedmetadata = () => {
                    const tracker = new tracking.ObjectTracker('face');
                    tracker.setInitialScale(4);
                    tracker.setStepSize(2);
                    tracker.setEdgesDensity(0.1);
                    
                    vTask = tracking.track('#webcam', tracker, { camera: true });
                    
                    tracker.on('track', event => {
                        const gate = document.getElementById('gate');
                        if (event.data.length > 0) {
                            gate.classList.remove('locked');
                        } else {
                            gate.classList.add('locked');
                        }
                    });
                };
            } catch(err) {
                alert("Доступ к камере отклонен или устройство не найдено.");
            }
        }
        function killCamera() {
            if(vTask) vTask.stop();
            const v = document.getElementById('webcam');
            if(v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
            v.style.display = 'none';
            document.getElementById('gate').classList.add('locked');
        }

        // --- 5. ATMOSPHERE (High Fidelity & Working Links) ---
        const tracks = [
            {n:'Rain', i:'🌧️', s:'https://actions.google.com/sounds/v1/weather/rain_on_roof.ogg'},
            {n:'Fire', i:'🔥', s:'https://actions.google.com/sounds/v1/ambiences/fireplace.ogg'},
            {n:'Forest', i:'🌲', s:'https://actions.google.com/sounds/v1/ambiences/forest_ambience.ogg'},
            {n:'Wind', i:'🌬️', s:'https://actions.google.com/sounds/v1/weather/wind_gentle_howl.ogg'},
            {n:'Waves', i:'🌊', s:'https://actions.google.com/sounds/v1/water/waves_crashing_on_shore.ogg'},
            {n:'Storm', i:'⚡', s:'https://actions.google.com/sounds/v1/weather/thunder_crack.ogg'},
            {n:'Cafe', i:'☕', s:'https://actions.google.com/sounds/v1/ambiences/coffee_shop.ogg'},
            {n:'Train', i:'🚂', s:'https://actions.google.com/sounds/v1/transportation/train_passing.ogg'},
            {n:'Night', i:'🌙', s:'https://actions.google.com/sounds/v1/ambiences/crickets_chirping.ogg'},
            {n:'Keyboard', i:'⌨️', s:'https://www.soundjay.com/mechanical/typewriter-key-1.mp3'}
        ];
        const activeTracks = {};
        const board = document.getElementById('soundboard');

        tracks.forEach(track => {
            const tile = document.createElement('div');
            tile.className = 'audio-tile';
            tile.innerHTML = `<span>${track.i}</span><p>${track.n}</p>`;
            tile.onclick = () => {
                if(activeTracks[track.n]) {
                    activeTracks[track.n].pause(); delete activeTracks[track.n];
                    tile.classList.remove('active');
                } else {
                    const audio = new Audio(track.s); 
                    audio.loop = true; 
                    audio.play().catch(e => console.log("Браузер заблокировал звук. Нужен клик."));
                    activeTracks[track.n] = audio; 
                    tile.classList.add('active');
                }
            };
            board.appendChild(tile);
        });

        function silenceAll() {
            Object.values(activeTracks).forEach(a => a.pause());
            for(let key in activeTracks) delete activeTracks[key];
            document.querySelectorAll('.audio-tile').forEach(t => t.classList.remove('active'));
        }
    </script>
</body>
</html>
