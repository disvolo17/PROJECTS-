<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core OS 26.3 | Visionary</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --ios-bg: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
            --glass: blur(80px) saturate(210%);
            --card: rgba(255, 255, 255, 0.5);
            --accent: #007aff;
            --text: #000;
            --spring: cubic-bezier(0.4, 1.1, 0.3, 1.1); /* Фирменная пружина iOS */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            background: var(--ios-bg);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            height: 100vh;
            overflow: hidden;
            color: var(--text);
        }

        /* --- Dynamic Tab Bar --- */
        nav {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            background: var(--card);
            backdrop-filter: var(--glass);
            padding: 8px;
            border-radius: 44px;
            border: 0.5px solid rgba(255,255,255,0.8);
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            z-index: 1000;
        }

        .nav-btn {
            padding: 12px 28px;
            border-radius: 36px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.4s var(--spring);
            opacity: 0.4;
        }

        .nav-btn.active { opacity: 1; background: #fff; transform: scale(1.05); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        /* --- Sections & Animations --- */
        .stage { height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        .view { 
            display: none; width: 100%; max-width: 1000px; padding: 40px;
            flex-direction: column; align-items: center; text-align: center;
        }

        /* Анимация появления контента */
        .view.active { 
            display: flex; 
            animation: ios-slide 0.7s var(--spring) forwards;
        }

        @keyframes ios-slide {
            0% { opacity: 0; transform: translateY(50px) scale(0.9); filter: blur(10px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        /* 1. Поток */
        #flow-input { background: none; border: none; font-size: 5rem; font-weight: 900; outline: none; width: 100%; text-align: center; letter-spacing: -2px; }
        .danger { position: fixed; inset: 0; background: rgba(255,0,0,0.05); opacity: 0; transition: 2s; pointer-events: none; }

        /* 2. Очищение (Физика падения) */
        .cleanse-container { width: 100%; max-width: 600px; position: relative; height: 300px; display: flex; flex-direction: column; }
        #cleanse-txt { 
            background: var(--card); border-radius: 30px; padding: 30px; border: none; 
            font-size: 1.5rem; outline: none; resize: none; min-height: 150px; backdrop-filter: var(--glass);
        }
        .word-particle {
            position: absolute; pointer-events: none; font-weight: 700; font-size: 1.2rem;
            color: var(--accent); white-space: nowrap; transition: transform 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        /* 3. Орбита */
        #map { width: 100%; height: 400px; border-radius: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.1); border: 4px solid #fff; }

        /* 4. Взгляд */
        .vision-shield { 
            background: var(--card); backdrop-filter: var(--glass); padding: 60px; border-radius: 50px;
            transition: 0.8s var(--spring);
        }
        .vision-shield.hide { filter: blur(60px); opacity: 0.1; transform: scale(0.95); }

        /* 5. Атмосфера */
        .sound-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .sound-tile {
            background: var(--card); backdrop-filter: blur(20px); border-radius: 28px; padding: 20px;
            width: 140px; height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.4s var(--spring); border: 1px solid rgba(255,255,255,0.4);
        }
        .sound-tile.on { background: #fff; transform: translateY(-10px) scale(1.05); border-color: var(--accent); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .sound-tile span { font-size: 2.2rem; margin-bottom: 8px; }
        .sound-tile p { font-size: 10px; font-weight: 800; opacity: 0.5; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="danger" id="danger-overlay"></div>

    <nav>
        <div class="nav-btn active" onclick="show(1, this)">Поток</div>
        <div class="nav-btn" onclick="show(2, this)">Очищение</div>
        <div class="nav-btn" onclick="show(3, this)">Орбита</div>
        <div class="nav-btn" onclick="show(4, this)">Взгляд</div>
        <div class="nav-btn" onclick="show(5, this)">Атмосфера</div>
    </nav>

    <main class="stage">
        <section id="p1" class="view active">
            <input type="text" id="flow-input" placeholder="Think..." autocomplete="off">
        </section>

        <section id="p2" class="view">
            <div class="cleanse-container" id="c-box">
                <textarea id="cleanse-txt" placeholder="О чем молчишь?"></textarea>
                <p style="font-size: 11px; font-weight: 800; margin-top: 20px; opacity: 0.3;">TAP ENTER TO RELEASE</p>
            </div>
        </section>

        <section id="p3" class="view">
            <div id="map"></div>
        </section>

        <section id="p4" class="view">
            <div class="vision-shield hide" id="v-shield">
                <h2 style="font-size: 3rem; margin-bottom: 20px;">Privacy Focus</h2>
                <p style="font-size: 1.3rem; opacity: 0.7; line-height: 1.5;">Это пространство становится видимым только при полной концентрации. Уведи курсор или смени вкладку — и контент превратится в чистый свет.</p>
            </div>
        </section>

        <section id="p5" class="view">
            <div class="sound-grid" id="grid-box"></div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let currentTab = 1;
        const sounds = [
            {n:'Rain', i:'🌧️'}, {n:'Wind', i:'🌬️'}, {n:'Fire', i:'🔥'}, {n:'Forest', i:'🌲'},
            {n:'Waves', i:'🌊'}, {n:'Thunder', i:'⚡'}, {n:'Cafe', i:'☕'}, {n:'Space', i:'🪐'},
            {n:'Train', i:'🚂'}, {n:'Zen', i:'🧘'}, {n:'Night', i:'🌙'}, {n:'City', i:'🌆'},
            {n:'Keys', i:'⌨️'}, {n:'Birds', i:'🐦'}, {n:'Radio', i:'📻'}, {n:'Drop', i:'🫧'},
            {n:'Flight', i:'✈️'}, {n:'Library', i:'📚'}, {n:'Clock', i:'⏰'}, {n:'Sleep', i:'💤'}
        ];

        function show(id, el) {
            currentTab = id;
            document.querySelectorAll('.view, .nav-btn').forEach(x => x.classList.remove('active'));
            document.getElementById('p'+id).classList.add('active');
            el.classList.add('active');
            if(id === 3) setTimeout(() => map.invalidateSize(), 300);
            stopGlobalEffects();
        }

        function stopGlobalEffects() {
            document.getElementById('danger-overlay').style.opacity = '0';
            if(currentTab !== 5) stopAudio();
        }

        // --- 1. Flow ---
        let flowT;
        document.getElementById('flow-input').addEventListener('input', () => {
            document.getElementById('danger-overlay').style.opacity = '0';
            clearTimeout(flowT);
            flowT = setTimeout(() => { if(currentTab === 1) document.getElementById('danger-overlay').style.opacity = '1'; }, 2500);
        });

        // --- 2. Cleanse (Gravity Physics) ---
        const cTxt = document.getElementById('cleanse-txt');
        cTxt.addEventListener('keydown', (e) => {
            if(e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const words = cTxt.value.split(' ');
                words.forEach((w, i) => {
                    if(!w) return;
                    const span = document.createElement('div');
                    span.className = 'word-particle';
                    span.innerText = w;
                    span.style.left = (Math.random() * 80 + 10) + '%';
                    span.style.top = '100px';
                    document.getElementById('c-box').appendChild(span);
                    
                    // Эмуляция падения и удара
                    setTimeout(() => {
                        const fallDist = window.innerHeight - 350; // Расстояние до низа экрана
                        span.style.transform = `translateY(${fallDist}px) rotate(${Math.random()*40-20}deg)`;
                        span.style.opacity = '0';
                        span.style.filter = 'blur(10px)';
                    }, i * 50);
                    setTimeout(() => span.remove(), 2500);
                });
                cTxt.value = '';
            }
        });

        // --- 3. Orbit (Map) ---
        const map = L.map('map', {zoomControl: false}).setView([0, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        const marker = L.marker([0, 0], {icon: L.divIcon({html:'🚀', className:'iss', iconSize:[30,30]})}).addTo(map);
        async function updateISS() {
            try {
                const r = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
                const d = await r.json();
                marker.setLatLng([d.latitude, d.longitude]);
                if(currentTab === 3) map.panTo([d.latitude, d.longitude]);
            } catch(e) {}
        }
        setInterval(updateISS, 5000); updateISS();

        // --- 4. Vision ---
        const vs = document.getElementById('v-shield');
        vs.addEventListener('mouseenter', () => vs.classList.remove('hide'));
        vs.addEventListener('mouseleave', () => vs.classList.add('hide'));

        // --- 5. Atmosphere ---
        const grid = document.getElementById('grid-box');
        const aCtx = new (window.AudioContext || window.webkitAudioContext)();
        const activeNodes = {};

        sounds.forEach(s => {
            const tile = document.createElement('div');
            tile.className = 'sound-tile';
            tile.innerHTML = `<span>${s.i}</span><p>${s.n}</p>`;
            tile.onclick = () => {
                if(aCtx.state === 'suspended') aCtx.resume();
                if(activeNodes[s.n]) {
                    activeNodes[s.n].stop(); delete activeNodes[s.n];
                    tile.classList.remove('on');
                } else {
                    const osc = aCtx.createOscillator();
                    const g = aCtx.createGain();
                    osc.type = 'sine'; osc.frequency.value = 120 + Math.random()*200;
                    g.gain.value = 0.01;
                    osc.connect(g); g.connect(aCtx.destination);
                    osc.start(); activeNodes[s.n] = osc;
                    tile.classList.add('on');
                }
            };
            grid.appendChild(tile);
        });

        function stopAudio() {
            Object.values(activeNodes).forEach(n => n.stop());
            document.querySelectorAll('.sound-tile').forEach(t => t.classList.remove('on'));
        }
    </script>
</body>
</html>
